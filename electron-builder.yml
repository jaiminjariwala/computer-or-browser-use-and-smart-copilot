appId: com.glass.screencopilot
productName: Computer or Browser Use and Smart Copilot
copyright: Copyright © 2025 Computer or Browser Use and Smart Copilot

directories:
  output: release
  buildResources: build

# Package the electron-vite production output (out/) plus package.json.
# package.json "main" points at out/main/index.js.
#
# electron-vite bundles the main process (out/main/index.js) and the renderer
# (out/renderer/**, including the transformers.js / ONNX-Runtime wasm) into
# self-contained output, so almost nothing under node_modules is required at
# runtime. By default electron-builder still copies every production
# dependency into the app (@huggingface/transformers, ...), which alone is
# ~1GB of dead weight. Excluding node_modules drops the packaged app from
# ~2GB to a few hundred MB (mostly the Electron framework itself).
#
# The ONE runtime exception is Playwright: it is marked `external` in the main
# build (imported lazily when Browser Use starts), so its two packages must
# ship. They are unpacked from the asar because playwright-core spawns its
# driver from real files on disk. At launch, Browser Use falls back from the
# Playwright-managed Chromium to the user's own Chrome/Edge/Brave, so no
# browser download is ever needed.
files:
  - out/**
  - package.json
  - '!node_modules/**/*'
  - node_modules/playwright/**
  - node_modules/playwright-core/**
asarUnpack:
  - node_modules/playwright/**
  - node_modules/playwright-core/**

# macOS configuration.
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  target:
    - dmg
    - zip
  # Odin needs the macOS Screen Recording permission (TCC). Screen Recording
  # does not require an Info.plist usage-description key (unlike camera/mic);
  # the user grants it via System Settings > Privacy & Security > Screen Recording.
  # We declare camera/mic usage strings defensively in case capture APIs touch them.
  extendInfo:
    NSCameraUsageDescription: Computer or Browser Use and Smart Copilot uses the camera when you choose to record a video attachment.
    NSMicrophoneUsageDescription: Computer or Browser Use and Smart Copilot uses the microphone for voice dictation and, when allowed, audio in video attachments you record.
    # The Mail connector reads the currently selected message via Apple events
    # (JXA). macOS shows this string in the Automation permission prompt.
    NSAppleEventsUsageDescription: Computer or Browser Use and Smart Copilot reads the email you selected in Mail or Outlook, only when you attach it to a chat.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing is intentionally NOT configured for a personal/local build.
  # identity: null produces an unsigned .app/.dmg suitable for local use.
  # For distribution, set a valid Developer ID identity and enable notarization.
  identity: null

dmg:
  title: Computer or Browser Use and Smart Copilot

# No publish provider configured for personal builds.
publish: null
